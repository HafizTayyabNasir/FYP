<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ title }}{% endblock %} - AI Client Hunt</title>
    
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c4b5fd',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                        },
                        accent: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        },
                        dark: {
                            800: '#1a1a2e',
                            900: '#0f0f1a',
                        }
                    },
                    animation: {
                        'gradient': 'gradient 8s ease infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-glow': 'pulse-glow 2s ease-in-out infinite',
                        'slide-up': 'slide-up 0.5s ease-out',
                        'slide-in-right': 'slide-in-right 0.3s ease-out',
                        'fade-in': 'fade-in 0.4s ease-out',
                        'bounce-subtle': 'bounce-subtle 2s infinite',
                    },
                    keyframes: {
                        gradient: {
                            '0%, 100%': { backgroundPosition: '0% 50%' },
                            '50%': { backgroundPosition: '100% 50%' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        'pulse-glow': {
                            '0%, 100%': { boxShadow: '0 0 20px rgba(139, 92, 246, 0.3)' },
                            '50%': { boxShadow: '0 0 40px rgba(139, 92, 246, 0.6)' },
                        },
                        'slide-up': {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        'slide-in-right': {
                            '0%': { transform: 'translateX(20px)', opacity: '0' },
                            '100%': { transform: 'translateX(0)', opacity: '1' },
                        },
                        'fade-in': {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        'bounce-subtle': {
                            '0%, 100%': { transform: 'translateY(-2%)' },
                            '50%': { transform: 'translateY(0)' },
                        },
                    },
                    backgroundImage: {
                        'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
                        'hero-gradient': 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                        'mesh-gradient': 'radial-gradient(at 40% 20%, hsla(270, 80%, 60%, 0.3) 0px, transparent 50%), radial-gradient(at 80% 0%, hsla(189, 100%, 56%, 0.2) 0px, transparent 50%), radial-gradient(at 0% 50%, hsla(355, 100%, 93%, 0.2) 0px, transparent 50%), radial-gradient(at 80% 50%, hsla(340, 100%, 76%, 0.2) 0px, transparent 50%), radial-gradient(at 0% 100%, hsla(240, 100%, 70%, 0.3) 0px, transparent 50%)',
                    },
                }
            }
        }
    </script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Custom styles -->
    <style>
        [x-cloak] { display: none !important; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        /* Gradient text */
        .gradient-text {
            background: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 50%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Score colors */
        .score-excellent { @apply bg-gradient-to-r from-green-500 to-emerald-500 text-white; }
        .score-good { @apply bg-gradient-to-r from-green-400 to-green-500 text-white; }
        .score-fair { @apply bg-gradient-to-r from-yellow-400 to-orange-500 text-white; }
        .score-poor { @apply bg-gradient-to-r from-red-500 to-rose-600 text-white; }
        
        /* Sidebar */
        .sidebar-link {
            @apply flex items-center px-3 py-2 text-sm text-gray-300 rounded-lg mx-2 my-0.5 transition-colors duration-200;
        }
        
        .sidebar-link:hover {
            @apply bg-white/10 text-white;
        }
        
        .sidebar-link.active {
            @apply bg-gradient-to-r from-primary-600 to-accent-600 text-white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }
        
        /* Modern Card */
        .card {
            @apply bg-white rounded-xl shadow-lg p-4 border border-gray-100;
        }
        
        /* Glass Card */
        .glass-card {
            @apply rounded-xl p-4 backdrop-blur-xl border border-white/20;
            background: rgba(255, 255, 255, 0.9);
        }
        
        /* Gradient Buttons */
        .btn-primary {
            @apply bg-gradient-to-r from-primary-600 to-accent-600 hover:from-primary-700 hover:to-accent-700 text-white font-semibold py-2.5 px-6 rounded-xl transition-colors duration-200;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }
        
        .btn-secondary {
            @apply bg-gray-100 hover:bg-gray-200 text-gray-800 font-semibold py-2.5 px-6 rounded-xl transition-colors duration-200 border border-gray-200 hover:border-gray-300;
        }
        
        .btn-success {
            @apply bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-semibold py-2.5 px-6 rounded-xl transition-colors duration-200;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        
        .btn-danger {
            @apply bg-gradient-to-r from-red-500 to-rose-600 hover:from-red-600 hover:to-rose-700 text-white font-semibold py-2.5 px-6 rounded-xl transition-colors duration-200;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }
        
        .btn-outline {
            @apply bg-transparent border-2 border-primary-500 text-primary-600 font-semibold py-2.5 px-6 rounded-xl transition-colors duration-200 hover:bg-primary-500 hover:text-white;
        }
        
        /* Input Fields */
        .input-field {
            @apply w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent bg-gray-50;
        }
        
        .input-field:focus {
            @apply bg-white;
        }
        
        /* Loading Spinner */
        .loading-spinner {
            @apply animate-spin rounded-full h-8 w-8 border-b-2 border-primary-600;
        }
        
        /* Progress bar gradient */
        .progress-gradient {
            background: linear-gradient(90deg, #8b5cf6, #3b82f6, #06b6d4);
            background-size: 200% 100%;
            animation: gradient 3s ease infinite;
        }
        
        /* Glow effect */
        .glow {
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3), 0 0 40px rgba(139, 92, 246, 0.1);
        }
        
        .glow-green {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3), 0 0 40px rgba(16, 185, 129, 0.1);
        }
        
        /* Badge styles */
        .badge {
            @apply inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold;
        }
        
        .badge-success {
            @apply bg-gradient-to-r from-green-100 to-emerald-100 text-green-700;
        }
        
        .badge-warning {
            @apply bg-gradient-to-r from-yellow-100 to-orange-100 text-yellow-700;
        }
        
        .badge-danger {
            @apply bg-gradient-to-r from-red-100 to-rose-100 text-red-700;
        }
        
        .badge-primary {
            @apply bg-gradient-to-r from-primary-100 to-accent-100 text-primary-700;
        }
        
        /* Table styles */
        .table-modern {
            @apply w-full text-sm;
        }
        
        .table-modern thead {
            @apply bg-gradient-to-r from-gray-50 to-gray-100;
        }
        
        .table-modern th {
            @apply px-3 py-2 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider;
        }
        
        .table-modern tbody tr {
            @apply border-b border-gray-100 hover:bg-gradient-to-r hover:from-primary-50/30 hover:to-accent-50/30 transition-all duration-200;
        }
        
        .table-modern td {
            @apply px-3 py-2;
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #8b5cf6, #3b82f6);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #7c3aed, #2563eb);
        }
        
        /* Stat card */
        .stat-card {
            @apply relative overflow-hidden rounded-2xl p-6 text-white;
            background: linear-gradient(135deg, var(--stat-from) 0%, var(--stat-to) 100%);
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 70%);
        }
        
        /* Sidebar gradient */
        .sidebar-gradient {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        
        /* Header glass effect */
        .header-glass {
            @apply backdrop-blur-xl bg-white/80 border-b border-gray-200/50;
        }
        
        /* Metric card - simple styling without animation */
        .metric-card {
            @apply relative;
        }
    </style>
    
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gradient-to-br from-gray-50 via-gray-100 to-gray-50 min-h-screen">
    <div class="flex h-screen" x-data="{ sidebarOpen: true }">
        <!-- Sidebar -->
        <aside class="sidebar-gradient text-white w-56 flex-shrink-0 transition-all duration-300 shadow-2xl" :class="{ 'hidden': !sidebarOpen }">
            <div class="p-4 border-b border-white/10">
                <div class="flex items-center space-x-2">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary-500 to-accent-500 flex items-center justify-center shadow-lg">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-base font-bold gradient-text">AI Client Hunt</h1>
                        <p class="text-xs text-gray-400">Outreach Automation</p>
                    </div>
                </div>
            </div>
            
            <nav class="mt-4 px-1">
                <a href="/" class="sidebar-link {% if request.url.path == '/' %}active{% endif %}">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                    Dashboard
                </a>
                
                <a href="/businesses" class="sidebar-link {% if '/businesses' in request.url.path %}active{% endif %}">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                    </svg>
                    Hunt Businesses
                </a>
                
                <a href="/audits" class="sidebar-link {% if '/audits' in request.url.path %}active{% endif %}">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                    </svg>
                    Website Audits
                </a>
                
                <a href="/outreach" class="sidebar-link {% if '/outreach' in request.url.path %}active{% endif %}">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                    Email Outreach
                </a>
                
                <a href="/campaigns" class="sidebar-link {% if '/campaigns' in request.url.path %}active{% endif %}">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path>
                    </svg>
                    Campaigns
                </a>
                
                <a href="/inbox" class="sidebar-link {% if '/inbox' in request.url.path %}active{% endif %}">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                    </svg>
                    Inbox
                </a>
                
                <div class="border-t border-white/10 mt-4 pt-4">
                    <a href="/settings" class="sidebar-link {% if '/settings' in request.url.path %}active{% endif %}">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                        Settings
                    </a>
                </div>
            </nav>
            
            <!-- Sidebar footer -->
            <div class="absolute bottom-0 left-0 right-0 p-3 border-t border-white/10">
                <div class="flex items-center space-x-2 px-2">
                    <div class="w-7 h-7 rounded-full bg-gradient-to-br from-primary-400 to-accent-500 flex items-center justify-center text-xs font-bold">
                        AI
                    </div>
                    <div class="flex-1">
                        <p class="text-xs font-medium text-white">AI Powered</p>
                        <p class="text-xs text-gray-400">v2.0</p>
                    </div>
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Top Header -->
            <header class="header-glass px-4 py-2 sticky top-0 z-30">
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <button @click="sidebarOpen = !sidebarOpen" class="text-gray-500 hover:text-primary-600 mr-3 p-1.5 rounded-lg hover:bg-primary-50 transition-all duration-200">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                            </svg>
                        </button>
                        <h2 class="text-lg font-bold text-gray-800">{{ title }}</h2>
                    </div>
                    
                    <div class="flex items-center space-x-3">
                        <div class="flex items-center space-x-2 px-3 py-1.5 rounded-lg bg-gradient-to-r from-primary-50 to-accent-50 border border-primary-100">
                            <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                            <span class="text-xs font-medium text-primary-700">AI Powered Outreach</span>
                        </div>
                    </div>
                </div>
            </header>
            
            <!-- Main Content Area -->
            <main class="flex-1 overflow-y-auto p-4">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    
    <!-- Toast Notifications -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col items-end space-y-2"></div>
    
    <script>
        // Toast notification function with modern styling
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            // Ensure message is a string
            let displayMsg = message;
            if (typeof message === 'object') {
                displayMsg = Array.isArray(message) 
                    ? message.map(m => m.msg || JSON.stringify(m)).join(', ')
                    : JSON.stringify(message);
            }
            
            const styles = {
                success: {
                    bg: 'bg-gradient-to-r from-green-500 to-emerald-600',
                    icon: `<svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`
                },
                error: {
                    bg: 'bg-gradient-to-r from-red-500 to-rose-600',
                    icon: `<svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`
                },
                info: {
                    bg: 'bg-gradient-to-r from-primary-500 to-accent-600',
                    icon: `<svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`
                },
                warning: {
                    bg: 'bg-gradient-to-r from-yellow-400 to-orange-500',
                    icon: `<svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`
                }
            };
            
            const style = styles[type] || styles.info;
            
            toast.className = `${style.bg} text-white px-5 py-3 rounded-xl shadow-2xl flex items-center font-medium transform transition-all duration-500 ease-out translate-x-0 opacity-0 scale-95`;
            toast.innerHTML = `${style.icon}<span>${displayMsg}</span>`;
            
            container.appendChild(toast);
            
            // Animate in
            requestAnimationFrame(() => {
                toast.classList.remove('opacity-0', 'scale-95');
                toast.classList.add('opacity-100', 'scale-100');
            });
            
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'scale-100');
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }
        
        // API helper function
        async function apiCall(url, options = {}) {
            try {
                const response = await fetch(url, {
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    },
                    ...options
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.detail || 'API request failed');
                }
                
                return data;
            } catch (error) {
                showToast(error.message, 'error');
                throw error;
            }
        }
        
        // Score color helpers with gradient support
        function getScoreColor(score) {
            if (score >= 4) return 'text-green-600';
            if (score >= 3) return 'text-yellow-600';
            if (score >= 2) return 'text-orange-600';
            return 'text-red-600';
        }
        
        function getScoreBg(score) {
            if (score >= 4) return 'bg-gradient-to-r from-green-500 to-emerald-500';
            if (score >= 3) return 'bg-gradient-to-r from-yellow-400 to-orange-500';
            if (score >= 2) return 'bg-gradient-to-r from-orange-500 to-red-500';
            return 'bg-gradient-to-r from-red-500 to-rose-600';
        }
        
        function getScoreGradient(score) {
            if (score >= 4) return 'from-green-500 to-emerald-500';
            if (score >= 3) return 'from-yellow-400 to-orange-500';
            if (score >= 2) return 'from-orange-500 to-red-500';
            return 'from-red-500 to-rose-600';
        }
        
        // Format score as percentage with animation
        function formatScore(score) {
            return Math.round((score / 5) * 100);
        }
    </script>
    
    {% block extra_scripts %}{% endblock %}
</body>
</html>
