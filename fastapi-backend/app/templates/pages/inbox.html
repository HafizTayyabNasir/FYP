{% extends "base.html" %}

{% block content %}
<div x-data="inboxData()" x-init="init()" class="animate-fade-in">
    <div class="flex h-[calc(100vh-8rem)] rounded-2xl overflow-hidden shadow-xl border border-gray-200">
        <!-- Email List Sidebar -->
        <div class="w-80 border-r bg-white flex flex-col">
            <div class="p-4 border-b bg-gradient-to-r from-gray-50 to-white">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center">
                        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary-400 to-accent-500 text-white flex items-center justify-center mr-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                            </svg>
                        </div>
                        <h2 class="text-lg font-bold text-gray-800">Inbox</h2>
                    </div>
                    <button @click="syncInbox" class="p-2 text-gray-400 hover:text-primary-600 hover:bg-primary-50 rounded-lg transition-all" :disabled="syncing">
                        <svg class="w-5 h-5" :class="{ 'animate-spin': syncing }" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                    </button>
                </div>
                
                <!-- Folder Tabs -->
                <div class="flex space-x-1 bg-gray-100 rounded-xl p-1">
                    <button @click="folder = 'inbox'" class="flex-1 text-sm py-2 px-3 rounded-lg transition-all duration-200 font-medium"
                            :class="folder === 'inbox' ? 'bg-white shadow-sm text-primary-700' : 'text-gray-500 hover:text-gray-700'">
                        Inbox <span class="ml-1 text-xs bg-gradient-to-r from-primary-100 to-accent-100 text-primary-600 px-2 py-0.5 rounded-full font-semibold" x-text="unreadCount"></span>
                    </button>
                    <button @click="folder = 'sent'" class="flex-1 text-sm py-2 px-3 rounded-lg transition-all duration-200 font-medium"
                            :class="folder === 'sent' ? 'bg-white shadow-sm text-primary-700' : 'text-gray-500 hover:text-gray-700'">
                        Sent
                    </button>
                </div>
            </div>
            
            <!-- Search -->
            <div class="p-3 border-b">
                <div class="relative">
                    <svg class="w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    <input type="text" x-model="searchQuery" @input.debounce.300ms="filterEmails" 
                           class="input-field text-sm pl-10" placeholder="Search emails...">
                </div>
            </div>
            
            <!-- Email List -->
            <div class="flex-1 overflow-y-auto">
                <template x-for="email in filteredEmails" :key="email.id">
                    <div @click="selectEmail(email)" 
                         class="p-4 border-b cursor-pointer transition-all duration-200"
                         :class="{ 'bg-gradient-to-r from-primary-50 to-accent-50 border-l-4 border-l-primary-500': selectedEmail?.id === email.id, 'bg-white hover:bg-gray-50': selectedEmail?.id !== email.id, 'font-semibold': !email.read }">
                        <div class="flex items-center justify-between mb-1">
                            <p class="text-sm truncate" :class="{ 'font-bold text-gray-900': !email.read, 'text-gray-700': email.read }" x-text="email.from_name || email.from_email"></p>
                            <span class="text-xs text-gray-400 ml-2" x-text="formatDate(email.date)"></span>
                        </div>
                        <p class="text-sm text-gray-800 truncate font-medium" x-text="email.subject"></p>
                        <p class="text-xs text-gray-500 truncate mt-1" x-text="email.preview || email.body?.substring(0, 80)"></p>
                    </div>
                </template>
                
                <div x-show="filteredEmails.length === 0" class="p-8 text-center text-gray-400">
                    <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-gradient-to-br from-gray-100 to-gray-200 flex items-center justify-center">
                        <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                    </div>
                    <p class="font-medium">No emails found</p>
                </div>
            </div>
        </div>
        
        <!-- Email Content -->
        <div class="flex-1 flex flex-col bg-gradient-to-br from-gray-50 to-gray-100">
            <template x-if="selectedEmail">
                <div class="flex-1 flex flex-col">
                    <!-- Email Header -->
                    <div class="bg-white border-b p-5 shadow-sm">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-xl font-bold text-gray-800" x-text="selectedEmail.subject"></h3>
                            <div class="flex space-x-2">
                                <button @click="replyToEmail" class="btn-primary text-sm">
                                    <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path>
                                    </svg>
                                    Reply
                                </button>
                                <button @click="archiveEmail" class="btn-outline text-sm">
                                    Archive
                                </button>
                                <button @click="deleteEmail" class="text-gray-400 hover:text-red-500 p-2 hover:bg-red-50 rounded-lg transition-all">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        
                        <div class="flex items-center text-sm text-gray-600">
                            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-400 to-accent-500 text-white flex items-center justify-center mr-3 font-bold shadow-lg"
                                 x-text="(selectedEmail.from_name || selectedEmail.from_email || 'U')[0].toUpperCase()">
                            </div>
                            <div>
                                <p class="font-semibold text-gray-900" x-text="selectedEmail.from_name || selectedEmail.from_email"></p>
                                <p class="text-gray-500 text-xs" x-text="'To: ' + (selectedEmail.to_email || 'me') + ' • ' + formatFullDate(selectedEmail.date)"></p>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Email Body -->
                    <div class="flex-1 overflow-y-auto p-6">
                        <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                            <div class="prose max-w-none" x-html="formatEmailBody(selectedEmail.body)"></div>
                            
                            <!-- Attachments -->
                            <div x-show="selectedEmail.attachments?.length > 0" class="mt-6 pt-4 border-t">
                                <h4 class="text-sm font-medium text-gray-700 mb-2">Attachments</h4>
                                <div class="flex flex-wrap gap-2">
                                    <template x-for="att in (selectedEmail.attachments || [])" :key="att.name">
                                        <a :href="att.url" class="inline-flex items-center px-3 py-2 bg-gray-100 rounded-lg text-sm hover:bg-gray-200">
                                            <svg class="w-4 h-4 mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path>
                                            </svg>
                                            <span x-text="att.name"></span>
                                        </a>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Quick Reply -->
                    <div class="bg-white border-t p-4" x-show="showReplyBox">
                        <div class="flex flex-col">
                            <textarea x-model="replyText" class="input-field mb-3" rows="4" placeholder="Write your reply..."></textarea>
                            <div class="flex justify-end space-x-2">
                                <button @click="showReplyBox = false" class="btn-secondary text-sm">Cancel</button>
                                <button @click="sendReply" class="btn-primary text-sm" :disabled="sendingReply">
                                    <span x-show="!sendingReply">Send Reply</span>
                                    <span x-show="sendingReply">Sending...</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
            
            <!-- No Email Selected -->
            <template x-if="!selectedEmail">
                <div class="flex-1 flex items-center justify-center text-gray-400">
                    <div class="text-center">
                        <svg class="w-16 h-16 mx-auto mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                        <p class="text-lg">Select an email to read</p>
                        <p class="text-sm mt-1">Choose from the list on the left</p>
                    </div>
                </div>
            </template>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function inboxData() {
    return {
        folder: 'inbox',
        emails: [],
        filteredEmails: [],
        selectedEmail: null,
        searchQuery: '',
        syncing: false,
        showReplyBox: false,
        replyText: '',
        sendingReply: false,
        unreadCount: 0,
        
        async init() {
            await this.loadEmails();
        },
        
        async loadEmails() {
            try {
                const response = await fetch(`/api/v1/mail/messages?folder=${this.folder}`);
                if (response.ok) {
                    const data = await response.json();
                    this.emails = data.messages || [];
                    this.filteredEmails = this.emails;
                    this.unreadCount = this.emails.filter(e => !e.read).length;
                }
            } catch (error) {
                // Load from localStorage as fallback
                this.emails = JSON.parse(localStorage.getItem('emails_' + this.folder) || '[]');
                this.filteredEmails = this.emails;
                this.unreadCount = this.emails.filter(e => !e.read).length;
            }
        },
        
        filterEmails() {
            if (!this.searchQuery) {
                this.filteredEmails = this.emails;
            } else {
                const q = this.searchQuery.toLowerCase();
                this.filteredEmails = this.emails.filter(e => 
                    e.subject?.toLowerCase().includes(q) ||
                    e.from_email?.toLowerCase().includes(q) ||
                    e.from_name?.toLowerCase().includes(q) ||
                    e.body?.toLowerCase().includes(q)
                );
            }
        },
        
        selectEmail(email) {
            this.selectedEmail = email;
            this.showReplyBox = false;
            
            // Mark as read
            if (!email.read) {
                email.read = true;
                this.unreadCount = Math.max(0, this.unreadCount - 1);
            }
        },
        
        async syncInbox() {
            this.syncing = true;
            try {
                const response = await fetch('/api/v1/mail/sync', { method: 'POST' });
                if (response.ok) {
                    await this.loadEmails();
                    showToast('Inbox synced!', 'success');
                }
            } catch (error) {
                showToast('Failed to sync inbox', 'error');
            } finally {
                this.syncing = false;
            }
        },
        
        replyToEmail() {
            this.showReplyBox = true;
            this.replyText = '';
        },
        
        async sendReply() {
            if (!this.replyText.trim()) return;
            
            this.sendingReply = true;
            try {
                const response = await fetch('/api/v1/mail/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        to_email: this.selectedEmail.from_email,
                        subject: 'Re: ' + this.selectedEmail.subject,
                        body: this.replyText,
                        reply_to_id: this.selectedEmail.id
                    })
                });
                
                if (response.ok) {
                    showToast('Reply sent!', 'success');
                    this.showReplyBox = false;
                    this.replyText = '';
                } else {
                    showToast('Failed to send reply', 'error');
                }
            } catch (error) {
                showToast('Failed to send reply', 'error');
            } finally {
                this.sendingReply = false;
            }
        },
        
        async archiveEmail() {
            this.emails = this.emails.filter(e => e.id !== this.selectedEmail.id);
            this.filteredEmails = this.filteredEmails.filter(e => e.id !== this.selectedEmail.id);
            this.selectedEmail = null;
            showToast('Email archived', 'success');
        },
        
        async deleteEmail() {
            if (!confirm('Are you sure you want to delete this email?')) return;
            
            this.emails = this.emails.filter(e => e.id !== this.selectedEmail.id);
            this.filteredEmails = this.filteredEmails.filter(e => e.id !== this.selectedEmail.id);
            this.selectedEmail = null;
            showToast('Email deleted', 'success');
        },
        
        formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const today = new Date();
            
            if (date.toDateString() === today.toDateString()) {
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
            return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
        },
        
        formatFullDate(dateStr) {
            if (!dateStr) return '';
            return new Date(dateStr).toLocaleString([], { 
                weekday: 'short', 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        },
        
        formatEmailBody(body) {
            if (!body) return '';
            // Convert newlines to <br> and preserve whitespace
            return body.replace(/\n/g, '<br>').replace(/  /g, '&nbsp;&nbsp;');
        }
    };
}
</script>
{% endblock %}
